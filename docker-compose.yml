services:
  postgres:
    image: postgres:16
    container_name: fitflow_postgres
    environment:
      POSTGRES_DB: fitflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fitflow_postgres_data:/var/lib/postgresql/data

volumes:
  fitflow_postgres_data: